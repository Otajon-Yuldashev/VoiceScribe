# ============================================================
# VoiceScribe — Cloud Build CI/CD Pipeline
#
# Before using this file, replace the following placeholders:
#   YOUR_PROJECT_ID        — your GCP project ID
#   YOUR_REGION            — e.g. europe-west1
#   YOUR_REPO_NAME         — your Artifact Registry repo name
#   YOUR_SERVICE_ACCOUNT   — e.g. my-sa@my-project.iam.gserviceaccount.com
#   YOUR_LOGS_BUCKET       — GCS bucket for Cloud Build logs
# ============================================================

logsBucket: 'gs://YOUR_LOGS_BUCKET'

steps:
  # ── BACKEND ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'check-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git log --oneline | wc -l | grep -q "^1$"; then
          echo "BACKEND_CHANGED=true" > /workspace/flags
        else
          git diff --name-only HEAD~1 HEAD | grep '^backend/' && echo "BACKEND_CHANGED=true" > /workspace/flags || echo "BACKEND_CHANGED=false" > /workspace/flags
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$BACKEND_CHANGED" = "true" ]; then
          docker build -t YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voice-pipeline-cloudrun ./backend
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$BACKEND_CHANGED" = "true" ]; then
          docker push YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voice-pipeline-cloudrun
        fi

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$BACKEND_CHANGED" = "true" ]; then
          gcloud run deploy voice-pipeline-cloudrun \
            --image=YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voice-pipeline-cloudrun:latest \
            --platform=managed \
            --region=YOUR_REGION \
            --allow-unauthenticated \
            --service-account=YOUR_SERVICE_ACCOUNT \
            --memory=4Gi \
            --cpu=2 \
            --timeout=3600
        fi

  # ── FRONTEND ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'check-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git log --oneline | wc -l | grep -q "^1$"; then
          echo "FRONTEND_CHANGED=true" >> /workspace/flags
        else
          git diff --name-only HEAD~1 HEAD | grep '^frontend/' && echo "FRONTEND_CHANGED=true" >> /workspace/flags || echo "FRONTEND_CHANGED=false" >> /workspace/flags
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$FRONTEND_CHANGED" = "true" ]; then
          docker build -t YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voicescribe ./frontend
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$FRONTEND_CHANGED" = "true" ]; then
          docker push YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voicescribe
        fi

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/flags
        if [ "$$FRONTEND_CHANGED" = "true" ]; then
          gcloud run deploy voicescribe \
            --image=YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/voicescribe:latest \
            --platform=managed \
            --region=YOUR_REGION \
            --allow-unauthenticated \
            --service-account=YOUR_SERVICE_ACCOUNT \
            --memory=1Gi
        fi
